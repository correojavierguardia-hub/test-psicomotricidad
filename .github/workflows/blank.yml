name: Crear Ejecutable Robusto
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Descargar motor NW.js
        run: |
          curl -L https://dl.nwjs.io/v0.82.0/nwjs-v0.82.0-win-x64.zip -o nwjs.zip
          7z x nwjs.zip
          mv nwjs-v0.82.0-win-x64 engine

      - name: Empaquetar Juego
        shell: pwsh
        run: |
          # Creamos el paquete de la app
          Compress-Archive -Path "index.html", "package.json" -DestinationPath "app.nw"
          # Unimos el motor con nuestra app para crear el EXE real
          cmd /c "copy /b engine\nw.exe+app.nw UGR-Test-Final.exe"
          # Copiamos las librerias necesarias
          cp engine/*.dll .
          cp engine/nw.pak .
          cp engine/icudtl.dat .

      - name: Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: Test-UGR-Funcional
          path: |
            UGR-Test-Final.exe
            *.dll
            *.pak
            *.dat
